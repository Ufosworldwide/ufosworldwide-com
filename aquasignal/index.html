<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Garamond&family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        :root { 
            --aqua: #0077b6; 
            --deep: #030303; 
            --phi: 1.61803398875; 
            --schumann: 7.83s;
        }
        
        body, html { 
            background: var(--deep); color: #fff; 
            margin: 0; padding: 0; overflow-x: hidden;
            font-family: 'Garamond', serif; letter-spacing: 0.1em;
        }

        /* --- THE SPIRAL INTERFACE --- */
        #spiral-interface {
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 1s ease;
        }

        .universal-spiral { 
            position: relative; width: 85vmin; height: 85vmin; 
            animation: spiralRotate 55s linear infinite; 
        }

        .center-beacon { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            width: 150px; height: 150px; 
            background: radial-gradient(circle, rgba(0,119,182,0.8) 0%, transparent 70%); 
            border-radius: 50%;
            animation: pulse var(--schumann) ease-in-out infinite; 
            cursor: pointer; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .node { 
            position: absolute; text-decoration: none; color: var(--aqua); 
            font-size: 0.7rem; opacity: 0.6; font-family: 'Inter', sans-serif;
            animation: bloom 3s forwards;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(var(--angle)) translateY(calc(-1 * var(--dist))) rotate(calc(-1 * var(--angle)));
        }

        /* --- THE WATER INTELLIGENCE HULL --- */
        #data-hull {
            display: none; 
            padding: 40px;
            background: #fff; color: #0f172a;
        }

        .map-wrapper { height: 600px; border: 1px solid #e2e8f0; margin-bottom: 40px; border-radius: 8px; overflow: hidden; }
        #water-map { width: 100%; height: 100%; }

        @keyframes spiralRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; } 50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; } }
        @keyframes bloom { to { opacity: 0.8; } }
    </style>
</head>

            </div>
    </section>

    <script>
        function engageAqua() {
            document.getElementById('spiral-interface').style.display = 'none';
            document.getElementById('data-hull').style.display = 'block';
            window.scrollTo(0,0);

        function initWaterMap() {
