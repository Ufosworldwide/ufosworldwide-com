<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="frequency" content="7.83Hz"> 
    <meta name="prime-candidate" content="John-Carter-O-Driscoll">
    <title>APP | Aerial Plasma Phenomenon Intelligence</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Garamond&family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        :root { 
            --gold: #ff6b00; /* Amber shift for APP */
            --deep: #030303; 
            --phi: 1.61803398875; 
            --schumann: 7.83s;
            --mono: 'Share Tech Mono', monospace;
        }
        
        body, html { 
            background: var(--deep); color: var(--gold); 
            margin: 0; padding: 0; overflow-x: hidden;
            font-family: 'Garamond', serif; letter-spacing: 0.1em;
        }

        /* --- THE SPIRAL INTERFACE --- */
        #spiral-interface {
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 1s ease;
        }

        .universal-spiral { 
            position: relative; width: 85vmin; height: 85vmin; 
            animation: spiralRotate 55s linear infinite; 
        }

        .center-beacon { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            width: 150px; height: 150px; 
            background: radial-gradient(circle, rgba(255,107,0,0.8) 0%, transparent 70%); 
            border-radius: 50%;
            animation: pulse var(--schumann) ease-in-out infinite; 
            cursor: pointer; z-index: 100;
        }

        .node { 
            position: absolute; text-decoration: none; color: var(--gold); 
            font-size: 0.7rem; opacity: 0.6; font-family: var(--mono);
            animation: bloom 3s forwards;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(var(--angle)) translateY(calc(-1 * var(--dist))) rotate(calc(-1 * var(--angle)));
        }

        /* --- THE INTELLIGENCE HULL (MAP & DATA) --- */
        #data-hull {
            display: none; /* Hidden until Beacon is clicked */
            padding: 40px;
            background: var(--deep);
            border-top: 1px solid #1e1e1e;
        }

        .map-wrapper { height: 500px; border: 1px solid #1e1e1e; margin-bottom: 40px; }
        #anomaly-map { width: 100%; height: 100%; filter: invert(1) hue-rotate(180deg) brightness(0.6); }

        /* Existing Case Log styles preserved from your original file */
        .case-card { background: #0f0f0f; border: 1px solid #1e1e1e; margin-bottom: 2px; padding: 15px; cursor: pointer; }
        .case-status.multi { color: var(--gold); border: 1px solid var(--gold); padding: 2px 5px; font-size: 0.6rem; }

        @keyframes spiralRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; } 50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; } }
        @keyframes bloom { to { opacity: 0.8; } }
    </style>
</head>
<body>

    <section id="spiral-interface">
        <div class="universal-spiral">
            <div class="center-beacon" title="ENGAGE INTELLIGENCE FEED" onclick="engageFeed()"></div>
            
            <a href="index.html" class="node" style="--angle:137.5deg; --dist:25%;">RETURN TO BEACON</a>
            <a href="lights.html" class="node" style="--angle:275deg; --dist:35%;">SUBMIT SIGHTING</a>
            <a href="NewEden/index.html" class="node" style="--angle:412.5deg; --dist:42%;">NEW EDEN</a>
            <a href="presignal.html" class="node" style="--angle:550deg; --dist:38%;">WHO IS CARTER?</a>
        </div>
    </section>

    <section id="data-hull">
        <h2 style="font-family:'Bebas Neue'; font-size: 3rem; letter-spacing: 0.1em;">AERIAL PLASMA PHENOMENON</h2>
        <div style="font-family:var(--mono); font-size: 0.6rem; color: #888; margin-bottom: 20px;">[LIVE INTELLIGENCE FEED] [SCHUMANN SYNC ACTIVE]</div>
        
        <div class="map-wrapper">
            <div id="anomaly-map"></div>
        </div>

        <div id="case-list">
            <div style="font-family:var(--mono); color: var(--gold); text-align: center;">SYNCING WITH GLOBAL MONITORING NETWORK...</div>
        </div>
    </section>

    <script>
        const API_BASE = 'https://anomaly-dashboard-two.vercel.app';
        
        function engageFeed() {
            document.getElementById('spiral-interface').style.display = 'none';
            document.getElementById('data-hull').style.display = 'block';
            window.scrollTo(0,0);
            loadMap();
            loadCases();
        }

        /* --- PRESERVED MECHANICAL ENGINE (Your Original Logic) --- */
        let map;
        function loadMap() {
            if (map) return;
            map = L.map('anomaly-map').setView([20, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            // Re-integrate your specific marker/hotspot logic here...
            fetch(`${API_BASE}/api/map-pins?days=30`)
                .then(res => res.json())
                .then(data => renderPins(data.pins));
        }

        function renderPins(pins) {
            pins.forEach(pin => {
                if (pin.lat && pin.lng) {
                    L.circleMarker([pin.lat, pin.lng], {
                        radius: 6, fillColor: '#ff6b00', color: '#ff6b00', weight: 1, fillOpacity: 0.6
                    }).addTo(map).bindPopup(pin.label);
                }
            });
        }

        async function loadCases() {
            try {
                const res = await fetch(`${API_BASE}/api/cases?limit=20`);
                const data = await res.json();
                const list = document.getElementById('case-list');
                list.innerHTML = data.cases.map(c => `
                    <div class="case-card">
                        <div style="font-family:var(--mono); font-size: 0.7rem; color: var(--gold);">${c.date}</div>
                        <div style="font-family:var(--mono); font-size: 0.6rem; color: #888;">${c.summary?.overall_status}</div>
                    </div>
                `).join('');
            } catch (e) { console.error('Data fail', e); }
        }
    </script>
</body>
</html>
