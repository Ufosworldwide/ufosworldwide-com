<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="frequency" content="7.83Hz"> 
    <meta name="prime-candidate" content="John-Carter-O-Driscoll">
    <title>APP | Aerial Plasma Phenomenon Intelligence</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Garamond&family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        :root { 
            --gold: #ff6b00; 
            --deep: #030303; 
            --phi: 1.61803398875; 
            --schumann: 7.83s;
            --mono: 'Share Tech Mono', monospace;
        }
        
        body, html { 
            background: var(--deep); color: var(--gold); 
            margin: 0; padding: 0; overflow-x: hidden;
            font-family: 'Garamond', serif; letter-spacing: 0.1em;
        }

        /* --- THE SPIRAL INTERFACE --- */
        #spiral-interface {
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            position: fixed; top: 0; left: 0; z-index: 1000;
            background: var(--deep);
        }

        .universal-spiral { 
            position: relative; width: 85vmin; height: 85vmin; 
            animation: spiralRotate 55s linear infinite; 
            pointer-events: none; /* FIX: Clicks pass through container */
        }

        .center-beacon { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            width: 150px; height: 150px; 
            background: radial-gradient(circle, rgba(255,107,0,0.8) 0%, transparent 70%); 
            border-radius: 50%;
            animation: pulse var(--schumann) ease-in-out infinite; 
            cursor: pointer; z-index: 1001;
            pointer-events: auto; /* FIX: Beacon is clickable */
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .node { 
            position: absolute; text-decoration: none; color: var(--gold); 
            font-size: 0.7rem; opacity: 0.6; font-family: var(--mono);
            top: 50%; left: 50%;
            pointer-events: auto; /* FIX: Petals are clickable */
            transform: translate(-50%, -50%) rotate(var(--angle)) translateY(calc(-1 * var(--dist))) rotate(calc(-1 * var(--angle)));
        }

        /* --- THE DASHBOARD HULL (Full Original Logic) --- */
        #data-hull {
            display: none; 
            padding: 20px;
            background: #000;
        }

        .dashboard-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid #1e1e1e; padding-bottom: 20px; margin-bottom: 20px; }
        
        .map-container { height: 500px; border: 1px solid #1e1e1e; position: relative; margin-bottom: 20px; }
        #anomaly-map { width: 100%; height: 100%; filter: invert(1) hue-rotate(180deg) brightness(0.5); }

        .case-card { 
            background: #0a0a0a; border: 1px solid #1e1e1e; 
            padding: 15px; margin-bottom: 10px; font-family: var(--mono);
            font-size: 0.8rem;
        }

        @keyframes spiralRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.2); } }
    </style>
</head>
<body>

    <section id="spiral-interface">
        <div class="universal-spiral">
            <div class="center-beacon" onclick="engageFeed()">
                <span style="font-family:'Bebas Neue'; font-size: 1.5rem; color: #fff;">ENGAGE</span>
                <span style="font-size: 0.5rem; color: #fff;">INTELLIGENCE</span>
            </div>
            <a href="index.html" class="node" style="--angle:137.5deg; --dist:25%;">HOME BEACON</a>
            <a href="lights.html" class="node" style="--angle:275deg; --dist:35%;">SUBMIT DATA</a>
            <a href="NewEden/index.html" class="node" style="--angle:412.5deg; --dist:42%;">NEW EDEN</a>
        </div>
    </section>

    <section id="data-hull">
        <div class="dashboard-header">
            <div>
                <h1 style="font-family:'Bebas Neue'; font-size: 2.5rem; margin: 0;">ANOMALY INTELLIGENCE DASHBOARD</h1>
                <div style="font-family:var(--mono); font-size: 0.6rem;">[SYSTEM STATUS: OPTIMAL] [SCHUMANN SYNC: 7.83Hz]</div>
            </div>
            <button onclick="location.reload()" style="background:none; border:1px solid var(--gold); color:var(--gold); font-family:var(--mono); cursor:pointer;">RESET VIEW</button>
        </div>

        <div class="map-container">
            <div id="anomaly-map"></div>
        </div>

        <div id="case-log-container">
            <div style="text-align:center; padding: 50px; font-family:var(--mono);">INITIALIZING API DATA FETCH...</div>
        </div>
    </section>

    <script>
        const API_BASE = 'https://anomaly-dashboard-two.vercel.app';
        
        function engageFeed() {
            document.getElementById('spiral-interface').style.display = 'none';
            document.getElementById('data-hull').style.display = 'block';
            initMap();
            fetchData();
        }

        let map;
        function initMap() {
            if (map) return;
            map = L.map('anomaly-map').setView([20, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            fetch(`${API_BASE}/api/map-pins?days=30`)
                .then(r => r.json())
                .then(data => {
                    data.pins.forEach(p => {
                        if(p.lat && p.lng) {
                            L.circleMarker([p.lat, p.lng], {radius: 5, color: '#ff6b00'}).addTo(map);
                        }
                    });
                });
        }

        async function fetchData() {
            const container = document.getElementById('case-log-container');
            try {
                const res = await fetch(`${API_BASE}/api/cases?limit=25`);
                const data = await res.json();
                container.innerHTML = data.cases.map(c => `
                    <div class="case-card">
                        <div style="color:#fff; margin-bottom: 5px;">${c.date} | ${c.location || 'Unknown'}</div>
                        <div style="color:#888;">${c.summary?.overall_status || 'Analyzing...'}</div>
                    </div>
                `).join('');
            } catch(e) {
                container.innerHTML = "DATA STREAM INTERRUPTED";
            }
        }
    </script>
</body>
</html>
