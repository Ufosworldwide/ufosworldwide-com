<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX Parts Intelligence — Performance Auto Group</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --navy: #001F5B;
    --blue: #0052A5;
    --blue-light: #1a6abf;
    --blue-pale: #e8f0fa;
    --white: #ffffff;
    --off-white: #f7f9fc;
    --border: #dde4ee;
    --text: #1a2440;
    --text-muted: #5a6a8a;
    --red: #d93025;
    --green: #1a7a4a;
    --green-bg: #e6f4ed;
    --amber: #c47a00;
    --amber-bg: #fff3e0;
    --shadow: 0 2px 12px rgba(0,31,91,0.10);
    --shadow-lg: 0 8px 32px rgba(0,31,91,0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--off-white);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ─────────────────────────────────── */
  header {
    background: var(--navy);
    padding: 0 24px;
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  /* Performance Auto Group SVG logo */
  .pag-logo {
    height: 34px;
    width: auto;
    flex-shrink: 0;
  }

  .header-divider {
    width: 1px;
    height: 28px;
    background: rgba(255,255,255,0.25);
  }

  .apex-wordmark {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }

  .apex-wordmark .apex {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #ffffff;
    text-transform: uppercase;
  }

  .apex-wordmark .sub {
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    margin-top: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 6px #22c55e;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .status-label {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.05em;
  }

  /* ── TABS ────────────────────────────────────── */
  .tabs-bar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    display: flex;
    padding: 0 24px;
    gap: 2px;
  }

  .tab-btn {
    padding: 12px 18px 11px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    border: none;
    background: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }

  .tab-btn:hover { color: var(--blue); }
  .tab-btn.active {
    color: var(--blue);
    border-bottom-color: var(--blue);
    font-weight: 600;
  }

  .tab-badge {
    display: inline-block;
    background: var(--red);
    color: white;
    font-size: 10px;
    font-weight: 700;
    border-radius: 10px;
    padding: 1px 6px;
    margin-left: 5px;
    vertical-align: middle;
  }

  /* ── CONTENT ─────────────────────────────────── */
  .content {
    flex: 1;
    display: flex;
    overflow: hidden;
    height: calc(100vh - 58px - 41px);
  }

  .tab-panel {
    display: none;
    width: 100%;
    overflow: hidden;
  }

  .tab-panel.active { display: flex; }

  /* ── CHAT PANEL ──────────────────────────────── */
  #panel-chat {
    flex-direction: row;
  }

  .chat-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .chat-messages::-webkit-scrollbar { width: 5px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .message {
    display: flex;
    gap: 10px;
    max-width: 740px;
    animation: msgIn 0.2s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg-avatar.apex-av { background: var(--blue); color: white; }
  .msg-avatar.user-av { background: var(--navy); color: white; font-size: 11px; }

  .msg-bubble {
    padding: 11px 15px;
    border-radius: 12px;
    font-size: 13.5px;
    line-height: 1.55;
    max-width: 600px;
  }

  .message.apex .msg-bubble {
    background: white;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    border-radius: 4px 12px 12px 12px;
    color: var(--text);
  }

  .message.user .msg-bubble {
    background: var(--navy);
    color: white;
    border-radius: 12px 4px 12px 12px;
  }

  .msg-bubble strong { font-weight: 600; }
  .msg-bubble .part-match {
    margin-top: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .part-match-header {
    background: var(--blue-pale);
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--blue);
    letter-spacing: 0.03em;
  }

  .part-match-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    font-size: 12.5px;
  }

  .part-match-row:nth-child(even) { background: var(--off-white); }

  .stock-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
  }

  .in-stock { background: var(--green-bg); color: var(--green); }
  .low-stock { background: var(--amber-bg); color: var(--amber); }
  .no-stock { background: #fde8e8; color: var(--red); }

  .chat-input-area {
    padding: 14px 24px;
    background: white;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .quick-chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .chip {
    font-size: 11.5px;
    padding: 4px 10px;
    border: 1px solid var(--blue);
    color: var(--blue);
    border-radius: 20px;
    cursor: pointer;
    background: none;
    transition: all 0.15s;
    font-family: inherit;
    white-space: nowrap;
  }

  .chip:hover { background: var(--blue); color: white; }

  #chat-input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13.5px;
    font-family: inherit;
    resize: none;
    outline: none;
    background: var(--off-white);
    color: var(--text);
    min-height: 42px;
    max-height: 110px;
    transition: border-color 0.15s;
  }

  #chat-input:focus { border-color: var(--blue); background: white; }
  #chat-input::placeholder { color: #9aaccb; }

  .send-btn {
    width: 42px; height: 42px;
    border-radius: 8px;
    background: var(--blue);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: var(--blue-light); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }

  .send-btn svg { width: 18px; height: 18px; fill: white; }

  /* typing indicator */
  .typing-dots {
    display: flex; gap: 4px; align-items: center; padding: 4px 0;
  }

  .typing-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--blue);
    animation: dot-bounce 1.2s infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  /* ── SIDEBAR ─────────────────────────────────── */
  .chat-sidebar {
    width: 270px;
    border-left: 1px solid var(--border);
    background: white;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .sidebar-section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .location-tile {
    background: var(--off-white);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    margin-bottom: 6px;
  }

  .location-tile:last-child { margin-bottom: 0; }

  .loc-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
    display: flex;
    justify-content: space-between;
  }

  .loc-detail {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }

  .loc-trucks {
    font-size: 11px;
    color: var(--blue);
    font-weight: 600;
  }

  .metric-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 4px 0;
    font-size: 12px;
    border-bottom: 1px solid var(--off-white);
  }

  .metric-row:last-child { border-bottom: none; }

  .metric-val {
    font-weight: 700;
    color: var(--blue);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
  }

  .metric-val.red { color: var(--red); }
  .metric-val.green { color: var(--green); }

  /* ── FOLLOW-UP PANEL ─────────────────────────── */
  #panel-followup {
    flex-direction: column;
    padding: 24px;
    overflow-y: auto;
    gap: 20px;
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .panel-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--navy);
  }

  .panel-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .followup-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
  }

  .followup-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--red);
    transition: box-shadow 0.15s;
  }

  .followup-card:hover { box-shadow: var(--shadow-lg); }
  .followup-card.warm { border-left-color: var(--amber); }
  .followup-card.ok { border-left-color: var(--green); }

  .fc-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }

  .fc-customer { font-size: 14px; font-weight: 700; }
  .fc-time { font-size: 11px; color: var(--text-muted); }

  .fc-detail { font-size: 12.5px; color: var(--text-muted); margin-bottom: 10px; line-height: 1.4; }

  .fc-actions { display: flex; gap: 8px; }

  .fc-btn {
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    transition: all 0.15s;
    border: 1px solid var(--border);
    background: white;
    color: var(--text);
  }

  .fc-btn.primary { background: var(--blue); color: white; border-color: var(--blue); }
  .fc-btn.primary:hover { background: var(--blue-light); }
  .fc-btn:hover { background: var(--off-white); }

  .fc-rep {
    font-size: 10.5px;
    color: var(--text-muted);
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .rep-score {
    display: inline-flex;
    gap: 2px;
  }

  .rep-score span {
    width: 8px; height: 8px;
    border-radius: 2px;
    background: var(--border);
  }

  .rep-score span.filled { background: var(--blue); }

  /* ── THE CASE PANEL ──────────────────────────── */
  #panel-case {
    flex-direction: column;
    padding: 24px;
    overflow-y: auto;
    gap: 24px;
  }

  .case-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 900px) {
    .case-grid { grid-template-columns: 1fr; }
  }

  .case-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    box-shadow: var(--shadow);
  }

  .case-card-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .stat-hero {
    font-size: 38px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1;
    font-family: 'DM Mono', monospace;
  }

  .stat-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .stat-delta {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
    margin-top: 8px;
  }

  .stat-delta.bad { background: #fde8e8; color: var(--red); }
  .stat-delta.good { background: var(--green-bg); color: var(--green); }

  /* bar chart */
  .bar-chart { display: flex; flex-direction: column; gap: 8px; }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
  }

  .bar-label { width: 90px; text-align: right; color: var(--text-muted); flex-shrink: 0; }

  .bar-track {
    flex: 1;
    height: 18px;
    background: var(--off-white);
    border-radius: 4px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 1s ease;
  }

  .bar-fill.blue { background: var(--blue); }
  .bar-fill.navy { background: var(--navy); }
  .bar-fill.red { background: var(--red); }
  .bar-fill.green { background: var(--green); }

  .bar-val { width: 60px; font-weight: 600; font-family: 'DM Mono', monospace; font-size: 11.5px; }

  /* profit table */
  .profit-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .profit-table th {
    text-align: left;
    padding: 6px 8px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }

  .profit-table td { padding: 7px 8px; border-bottom: 1px solid var(--off-white); }
  .profit-table tr:last-child td { border-bottom: none; font-weight: 700; }

  .delta-cell { font-weight: 600; font-family: 'DM Mono', monospace; font-size: 12px; }
  .delta-cell.pos { color: var(--green); }
  .delta-cell.neg { color: var(--red); }

  /* ── INVENTORY PANEL ─────────────────────────── */
  #panel-inventory {
    flex-direction: column;
    padding: 24px;
    overflow-y: auto;
    gap: 20px;
  }

  .inv-table-wrap {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .inv-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .inv-table th {
    background: var(--navy);
    color: white;
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .inv-table td { padding: 10px 14px; border-bottom: 1px solid var(--off-white); }
  .inv-table tr:last-child td { border-bottom: none; }
  .inv-table tr:hover td { background: var(--blue-pale); }
  .inv-table .mono { font-family: 'DM Mono', monospace; font-size: 12px; }

  /* ── RESPONSIVE ──────────────────────────────── */
  @media (max-width: 768px) {
    .chat-sidebar { display: none; }
    .case-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="header-left">
    <!-- Performance Auto Group Logo SVG -->
    <svg class="pag-logo" viewBox="0 0 200 62" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Performance Auto Group">

      <!-- Outer ring -->

      <!-- Top-right quadrant -->
      <path d="M31 31 L51.6 14.6 A26 26 0 0 0 31 5 Z" fill="white" opacity="0.85"/>
      <path d="M31 31 L47.4 10.4 A26 26 0 0 0 38 6.2 Z" fill="#0052A5"/>
      <!-- Right -->
      <path d="M31 31 L57 31 A26 26 0 0 1 51.6 47.4 Z" fill="#0052A5"/>
      <path d="M31 31 L55.8 38 A26 26 0 0 1 53.8 44 Z" fill="white" opacity="0.85"/>
      <!-- Bottom-right quadrant -->
      <path d="M31 31 L51.6 47.4 A26 26 0 0 1 31 57 Z" fill="white" opacity="0.85"/>
      <path d="M31 31 L47.4 51.6 A26 26 0 0 1 38 55.8 Z" fill="#0052A5"/>
      <!-- Bottom-left quadrant -->
      <path d="M31 31 L10.4 47.4 A26 26 0 0 0 31 57 Z" fill="#0052A5"/>
      <path d="M31 31 L14.6 51.6 A26 26 0 0 0 24 55.8 Z" fill="white" opacity="0.85"/>
      <!-- Left -->
      <path d="M31 31 L5 31 A26 26 0 0 0 10.4 47.4 Z" fill="white" opacity="0.85"/>
      <path d="M31 31 L6.2 38 A26 26 0 0 0 8.2 44 Z" fill="#0052A5"/>
      <!-- Top-left fill -->
      <path d="M31 31 L5 31 A26 26 0 0 1 10.4 14.6 Z" fill="#0052A5"/>
      <path d="M31 31 L6.2 24 A26 26 0 0 1 10.4 14.6 Z" fill="white" opacity="0.85"/>
      <!-- Inner white hub -->
      <circle cx="31" cy="31" r="11" fill="white"/>
      <circle cx="31" cy="31" r="9" fill="#001F5B"/>
      <circle cx="31" cy="31" r="6" fill="white"/>
      <circle cx="31" cy="31" r="3" fill="#0052A5"/>

      <!-- PERFORMANCE text -->
      <text x="68" y="24" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="700" fill="white" letter-spacing="1">PERFORMANCE</text>
      <!-- AUTO GROUP text -->
      <text x="68" y="40" font-family="'DM Sans', Arial, sans-serif" font-size="11" font-weight="400" fill="rgba(255,255,255,0.75)" letter-spacing="2.5">AUTO GROUP</text>
      <!-- Thin rule -->
      <line x1="68" y1="44.5" x2="200" y2="44.5" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
      <!-- SINCE 1964 -->
      <text x="68" y="54" font-family="'DM Sans', Arial, sans-serif" font-size="8.5" font-weight="400" fill="rgba(255,255,255,0.45)" letter-spacing="2">EST. 1964</text>
    </svg>

    <div class="header-divider"></div>

    <div class="apex-wordmark">
      <span class="apex">APEX</span>
      <span class="sub">Parts Intelligence</span>
    </div>
  </div>

  <div class="header-right">
    <div class="status-dot"></div>
    <span class="status-label">System Online</span>
  </div>
</header>

<!-- ── TABS ── -->
<div class="tabs-bar">
  <button class="tab-btn active" onclick="switchTab('chat')">💬 Parts Assistant</button>
  <button class="tab-btn" onclick="switchTab('followup')">📞 Follow-Up Queue <span class="tab-badge" id="badge-count">7</span></button>
  <button class="tab-btn" onclick="switchTab('case')">📊 The Case</button>
  <button class="tab-btn" onclick="switchTab('inventory')">🗂 Inventory</button>
</div>

<!-- ── CONTENT ── -->
<div class="content">

  <!-- CHAT TAB -->
  <div class="tab-panel active" id="panel-chat">
    <div class="chat-main">
      <div class="chat-messages" id="chat-messages">

        <!-- Welcome message -->
        <div class="message apex">
          <div class="msg-avatar apex-av">A</div>
          <div class="msg-bubble">
            <strong>Welcome to APEX Parts Intelligence.</strong><br><br>
            I can look up any part by VIN, part number, year/make/model, or plain description. I'll verify fitment, check stock across all three hubs, and pro
