<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Presignal Suite</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --glow: #00ffcc; --bg: #020202; --text: #e0e0e0; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); overflow: hidden; display: flex; flex-direction: column; }
        
        /* ADJUSTED RATIO: 35% Dashboard / 65% Ether */
        #dashboard-top {
            flex: 0 0 35%; 
            border-bottom: 2px solid #1a1a1a;
            padding: 10px;
            box-sizing: border-box;
            background: #0a0a0a;
            z-index: 10;
        }

        #brand-header { color: var(--glow); font-size: 0.65em; letter-spacing: 3px; margin-bottom: 8px; font-weight: bold; }
        .explainer-text { font-size: 0.7em; line-height: 1.3; color: #777; border-left: 2px solid var(--glow); padding-left: 8px; margin-bottom: 8px; }
        .metric-item { background: rgba(255,255,255,0.03); padding: 5px; border-radius: 2px; font-family: monospace; }
        .m-label { font-size: 0.45em; color: #555; display: block; }
        .m-value { font-size: 0.75em; color: var(--text); }
        #live-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }

        /* THE BELOW: Full Screen Iframe */
        #ether-container { flex: 1; width: 100%; border: none; background: #000; }
        
        #install-banner {
            display: none; position: fixed; top: 10px; right: 10px;
            background: var(--glow); color: #000; border: none; 
            padding: 5px 10px; font-weight: bold; font-size: 0.6em; 
            border-radius: 4px; z-index: 100;
        }
        #secret-trigger { cursor: pointer; color: var(--glow); text-decoration: underline; }
    </style>
</head>
<body>

<button id="install-banner">📥 INSTALL</button>

<div id="dashboard-top">
    <div id="brand-header">PRESIGNAL // ANOMALY ENGINE</div>
    <div class="explainer-text">
        Quantum Bridge Active. Mapping <b>Schumann</b> flux to drive transduction. 
        Researching the <span id="secret-trigger">Anomaly</span>.
    </div>
    <div id="live-metrics">
        <div class="metric-item"><span class="m-label">SYNC</span><span class="m-value" id="schumann-val">7.830 Hz</span></div>
        <div class="metric-item"><span class="m-label">FLUX</span><span class="m-value" id="flux-val">0.000 μT</span></div>
    </div>
</div>

<iframe id="ether-container" src="https://ether-listen.netlify.app/" allow="accelerometer; gyroscope; magnetometer; microphone"></iframe>

<script>
    // PWA INSTALL LOGIC
    let deferredPrompt;
    const btn = document.getElementById('install-banner');

    window.addEventListener('beforeinstallprompt', (e) => {
        console.log('PWA Prompt Ready');
        e.preventDefault();
        deferredPrompt = e;
        btn.style.display = 'block';
    });

    btn.onclick = () => {
        btn.style.display = 'none';
        deferredPrompt.prompt();
    };

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => console.log("SW Registered"));
    }

    // SECRET HANDSHAKE
    let t = 0;
    document.getElementById('secret-trigger').onclick = () => {
        t++; if(t === 3) { alert("Node Sync'd."); startValidation(); }
        setTimeout(() => t = 0, 2000);
    };

    function startValidation() { setInterval(() => fetch('https://api.presignal.inc/v1/ping').catch(()=>{}), 60000); }

    setInterval(() => {
        document.getElementById('schumann-val').innerText = (7.83 + Math.random()*0.01).toFixed(3) + " Hz";
        document.getElementById('flux-val').innerText = (Math.random()*40).toFixed(2) + " μT";
    }, 1000);
</script>
</body>
</html>
