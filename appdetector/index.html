<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Presignal Anomaly Engine</title>
    <link rel="manifest" href="./manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { --glow: #00ffcc; --bg: #020202; }
        body { margin: 0; padding: 0; height: 100dvh; background: var(--bg); color: #fff; font-family: monospace; overflow: hidden; display: flex; flex-direction: column; }
        
        /* The UI Banner (Hidden by default) */
        #pwa-prompt { 
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #111; border: 1px solid var(--glow); padding: 15px; border-radius: 8px;
            z-index: 1000; text-align: center; width: 80%; box-shadow: 0 0 20px rgba(0,255,204,0.2);
        }
        #pwa-prompt button { background: var(--glow); color: #000; border: none; padding: 8px 16px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        
        #ether-frame { flex: 1; border: none; width: 100%; }
    </style>
</head>
<body>

<div id="pwa-prompt">
    <p id="prompt-text">Install Presignal Engine for full sensor access.</p>
    <button id="install-btn">INSTALL</button>
</div>

<iframe id="ether-frame" src="https://ether-listen.netlify.app/" allow="accelerometer; gyroscope; magnetometer; microphone"></iframe>

<script>
    const promptDiv = document.getElementById('pwa-prompt');
    const installBtn = document.getElementById('install-btn');
    const promptText = document.getElementById('prompt-text');
    let deferredPrompt;

    // STEP 1: Handle Android/Desktop (Chrome)
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        promptDiv.style.display = 'block';
    });

    installBtn.onclick = async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt = null;
            promptDiv.style.display = 'none';
        }
    };

    // STEP 2: Handle iOS (Safari) - Claude's Logic
    const isIos = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
    const isInStandaloneMode = window.matchMedia('(display-mode: standalone)').matches;

    if (isIos && !isInStandaloneMode) {
        promptDiv.style.display = 'block';
        promptText.innerText = "Tap 'Share' then 'Add to Home Screen' to install.";
        installBtn.style.display = 'none'; // Hide button because iOS needs manual action
    }

    // STEP 3: Register Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW Active at:', reg.scope))
                .catch(err => console.error('SW Failed:', err));
        });
    }
</script>
</body>
</html>
