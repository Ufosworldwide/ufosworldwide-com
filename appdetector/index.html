<!DOCTYPE html>

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* THE ABOVE: Telemetry Dashboard */
        #telemetry-top { height: 40vh; border-bottom: 2px solid #222; display: flex; flex-direction: column; background: linear-gradient(to bottom, #0a0a0a, #050505); }
        #header { padding: 10px; font-size: 0.6em; letter-spacing: 3px; color: var(--glow); border-bottom: 1px solid #111; text-align: center; }
        #data-stream { flex-grow: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .stat-box { border: 1px solid #1a1a1a; padding: 10px; border-radius: 4px; position: relative; overflow: hidden; }
        .label { font-size: 0.5em; color: #666; display: block; margin-bottom: 5px; }
        .value { font-size: 1.2em; color: var(--glow); text-shadow: 0 0 10px rgba(255,51,0,0.3); }

        /* THE BELOW: ETHER Integration */
        #ether-frame { width: 100%; height: 60vh; border: none; }
        
        /* The Secret Activation Crosshair */
        #conduit-trigger { position: absolute; top: 10px; left: 10px; width: 30px; height: 30px; border: 1px solid #111; border-radius: 50%; z-index: 100; cursor: pointer; }
    </style>
</head>
