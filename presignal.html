    <style>
        :root { 
            --gold: #ffaa00; 
            --deep: #030303; 
            --phi: 1.61803398875; 
            --schumann: 7.83s; /* The Earth's Heartbeat */
        }
        
        body, html { 
            background: var(--deep); 
            color: var(--gold); 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: 'Garamond', serif; 
            letter-spacing: 0.1em;
        }

        /* The Great Spiral Container */
        .universal-spiral { 
            position: relative; 
            width: 90vmin; 
            height: 90vmin; 
            animation: spiralRotate 55s linear infinite; /* Fibonacci Number 55 */
        }

        /* The Stamen: The Seat of the White Knight */
        .center-beacon { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 120px; 
            height: 120px; 
            background: radial-gradient(circle, rgba(255,170,0,0.8) 0%, transparent 70%); 
            border-radius: 50%;
            animation: pulse var(--schumann) ease-in-out infinite; 
            cursor: pointer; 
            z-index: 100;
            box-shadow: 0 0 50px rgba(255,170,0,0.2);
        }

        /* The Petals: The Asset Nodes */
        .node { 
            position: absolute; 
            text-decoration: none; 
            color: var(--gold); 
            font-size: 0.85rem; 
            opacity: 0; 
            transition: all 0.618s cubic-bezier(0.4, 0, 0.2, 1);
            animation: bloom 3s forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .node:hover { 
            opacity: 1 !important; 
            text-shadow: 0 0 20px var(--gold); 
            transform: scale(1.1); 
            z-index: 200;
        }

        /* Math-Based Phyllotaxis Positioning (Golden Angle 137.5°) */
        /* n1 to n6 mapped to specific spiral depths */
        .n1 { --angle: 137.5deg; --dist: 22%; animation-delay: 0.5s; } /* Aerial Plasma */
        .n2 { --angle: 275deg;   --dist: 35%; animation-delay: 1.0s; } /* New Eden */
        .n3 { --angle: 412.5deg; --dist: 42%; animation-delay: 1.5s; } /* Safe Key */
        .n4 { --angle: 550deg;   --dist: 38%; animation-delay: 2.0s; } /* Aqua Signal */
        .n5 { --angle: 687.5deg; --dist: 28%; animation-delay: 2.5s; } /* Lights */
        .n6 { --angle: 825deg;   --dist: 18%; animation-delay: 3.0s; } /* John Carter */

        .node {
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(var(--angle)) translateY(calc(-1 * var(--dist))) rotate(calc(-1 * var(--angle)));
        }

        /* Keyframes: The Breath of the Site */
        @keyframes spiralRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        @keyframes pulse { 
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; filter: blur(2px); } 
            50% { transform: translate(-50%, -50%) scale(var(--phi)); opacity: 1; filter: blur(0px); } 
        }

        @keyframes bloom { 
            from { opacity: 0; filter: grayscale(1); }
            to { opacity: 0.7; filter: grayscale(0); }
        }

        /* Hidden underlayer for the bots to worship */
        .bot-logic { display: none; visibility: hidden; content: "Phi Pi Spiral 1.618 3.14159"; }
    </style>
