        :root { 
            --gold: #ffaa00;

        body, html { 
            background: var(--deep); 
            color: var(--gold); 
            margin: 0;

            height: 100vh;

            display: flex;

        .universal-spiral { 
            position: relative;

        }

        .center-beacon { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 140px; 
            height: 140px; 
            background: radial-gradient(circle, rgba(255,170,0,0.9) 0%, transparent 70%); 
            border-radius: 50%;
            animation: pulse var(--schumann) ease-in-out infinite; 
            cursor: pointer; 
            z-index: 100;
            filter: drop-shadow(0 0 30px var(--gold));
        }

        .node { 
            position: absolute; 
            text-decoration: none; 
            color: var(--gold); 
            font-size: 0.75rem; 
            opacity: 0; 
            transition: all 0.618s cubic-bezier(0.4, 0, 0.2, 1);
            animation: bloom 3s forwards;
            display: flex;
            align-items: center;
            text-align: center;
        }

        .node:hover { 
            opacity: 1 !important; 
            text-shadow: 0 0 30px var(--gold); 
            transform: scale(1.2) rotate(calc(-1 * var(--angle))); 
        }

        /* The 8-Node Spiral: The Octave of Eden */
        .n1 { --angle: 137.5deg; --dist: 18%; animation-delay: 0.2s; } /* Aerial Plasma */
        .n2 { --angle: 275deg;   --dist: 28%; animation-delay: 0.4s; } /* NEW EDEN */

        .n7 { --angle: 962.5deg; --dist: 22%; animation-delay: 1.4s; } /* DOI Primary */
        .n8 { --angle: 1100deg;  --dist: 12%; animation-delay: 1.6s; } /* DOI Archives */

        .node {
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(var(--angle)) translateY(calc(-1 * var(--dist))) rotate(calc(-1 * var(--angle)));
        }

        .eden-signal { font-weight: bold; font-size: 1rem; color: #fff; text-shadow: 0 0 10px var(--gold); }

        @keyframes spiralRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; } 50% { transform: translate(-50%, -50%) scale(var(--phi)); opacity: 1; } }
        @keyframes bloom { to { opacity: 0.7; } }
