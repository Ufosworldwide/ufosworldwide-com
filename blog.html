<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PUBLICATIONS ARCHIVE</title>

<style>
body {
  background:#0b0f14;
  color:#e6e6e6;
  font-family: Arial;
  max-width:900px;
  margin:0 auto;
  padding:40px;
}

h1 {
  font-family: monospace;
  color:#7CFFB2;
}

.card {
  border:1px solid rgba(255,255,255,0.1);
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

a {
  color:#7CFFB2;
  text-decoration:none;
  font-family: monospace;
}
</style>
</head>

<body>

<h1>PUBLICATIONS ARCHIVE</h1>
<p>> AUTO-GENERATED FIELD REPORT INDEX</p>

<div id="posts">Loading archive...</div>

<script>
// SIMPLE AUTO INDEX (static-friendly approach)
fetch('/posts/manifest.json')
.then(r => r.json())
.then(posts => {
  const container = document.getElementById('posts');
  container.innerHTML = '';

  posts.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <div>${p.title}</div>
        <a href="${p.file}">OPEN FILE</a>
      </div>
    `;
  });
});
</script>

</body>
</html>
