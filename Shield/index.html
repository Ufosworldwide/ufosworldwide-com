<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeKey™ — Your Monthly Password Shield · Presignal Inc.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root { --bg: #080c10; --surface: #0d1520; --border: #1a2d44; --accent: #00e5ff; --accent2: #00ff88; --danger: #ff4455; --text: #c8dff0; --muted: #4a6b88; --gold: #ffd166; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
  
  .header { width: 100%; max-width: 600px; padding: 40px 20px 20px; text-align: center; }
  .brand { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; letter-spacing: 4px; color: var(--gold); line-height: 1; }
  
  /* SENTRY SCANNER BOX */
  .sentry-card { background: #0a1018; width: calc(100% - 40px); max-width: 500px; border-radius: 20px; border: 2px solid var(--accent); padding: 20px; margin-bottom: 20px; }
  .sentry-in { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; margin-top: 10px; resize: none; }
  .sentry-res { margin-top: 10px; padding: 12px; border-radius: 10px; font-weight: bold; display: none; text-align: center; }

  /* YOUR ORIGINAL MAIN CARD */
  .main-card { background: var(--surface); width: calc(100% - 40px); max-width: 500px; border-radius: 30px; border: 1px solid var(--border); padding: 30px; }
  .btn-gen { width: 100%; padding: 20px; border-radius: 15px; border: none; background: linear-gradient(135deg, var(--accent), #00a8ff); color: #000; font-weight: 800; font-size: 1.2rem; cursor: pointer; }
  .display-box { margin-top: 25px; background: #000; border: 2px dashed var(--border); border-radius: 15px; padding: 20px; min-height: 80px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  #pwOut { font-family: 'Share Tech Mono', monospace; font-size: 1.4rem; color: var(--accent2); filter: blur(8px); transition: 0.3s; }
  #pwOut.unlocked { filter: blur(0); }
  .pin-area { margin-top: 20px; display: none; }
  .pin-input { width: 100%; background: #000; border: 1px solid var(--border); color: var(--accent); text-align: center; font-size: 1.8rem; padding: 10px; border-radius: 12px; letter-spacing: 5px; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="header">
  <div class="brand">SAFEKEY™</div>
  <p style="color:var(--muted); font-family:'Share Tech Mono';">BY PRESIGNAL INC.</p>
</div>

<div class="sentry-card">
  <h3 style="color:var(--accent); font-family:'Bebas Neue';">🛡️ SENTRY SCANNER</h3>
  <textarea id="sIn" class="sentry-in" rows="2" placeholder="Paste link or email here..."></textarea>
  <button onclick="scan()" style="width:100%; margin-top:10px; padding:10px; background:var(--border); color:white; border-radius:10px; border:none; cursor:pointer;">SCAN FOR TRAPS</button>
  <div id="sOut" class="sentry-res"></div>
</div>

<div class="main-card">
  <button class="btn-gen" onclick="generateKey()">GENERATE SHIELD</button>
  <div class="display-box" onclick="showAuth()">
    <div id="pwOut">••••••••••••••••••••••••</div>
  </div>
  <div id="auth" class="pin-area">
    <input type="tel" id="pIn" class="pin-input" maxlength="4" placeholder="••••" inputmode="numeric">
    <button onclick="unlock()" style="width:100%; padding:15px; background:var(--accent2); border:none; border-radius:12px; font-weight:bold; cursor:pointer;">UNLOCK</button>
  </div>
</div>

<script>
  let k = ""; let p = "1234";

  function generateKey() {
    let c = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789!@#$%&*";
    k = ""; for(let i=0; i<24; i++) k += c.charAt(Math.floor(Math.random()*c.length));
    document.getElementById('pwOut').innerText = "••••••••••••••••••••••••";
    document.getElementById('pwOut').classList.remove('unlocked');
    document.getElementById('auth').style.display = "none";
    alert("New Shield Active. Tap box to enter PIN.");
  }

  function showAuth() { if(!k) return alert("Generate first!"); document.getElementById('auth').style.display = "block"; }

  function unlock() {
    if(document.getElementById('pIn').value === p) {
      document.getElementById('pwOut').innerText = k;
      document.getElementById('pwOut').classList.add('unlocked');
      document.getElementById('auth').style.display = "none";
      document.getElementById('pIn').value = "";
    } else { alert("Access Denied"); }
  }

  function scan() {
    const v = document.getElementById('sIn').value.toLowerCase();
    const o = document.getElementById('sOut'); o.style.display = "block";
    const danger = [".exe", ".zip", "urgent", "suspended", "verify", "bit.ly"];
    let hits = danger.filter(w => v.includes(w));
    if(hits.length > 0) {
      o.style.background = "rgba(255, 68, 85, 0.2)"; o.style.color = "#ff4455";
      o.innerText = "🛑 TRAP DETECTED: " + hits.join(", ");
    } else {
      o.style.background = "rgba(0, 255, 136, 0.2)"; o.style.color = "#00ff88";
      o.innerText = "✅ NO OBVIOUS TRAPS FOUND.";
    }
  }
</script>
</body>
</html>
