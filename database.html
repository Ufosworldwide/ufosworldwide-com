<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UFOs Worldwide // Case Database</title>

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#05070c;
  color:#eaeaea;
}

header {
  text-align:center;
  padding:20px;
  border-bottom:1px solid #1f2937;
}

.container {
  max-width:900px;
  margin:auto;
  padding:15px;
}

.card {
  background:#0b1220;
  border:1px solid #1f2937;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  font-family:monospace;
  white-space:pre-wrap;
}

a { color:#38bdf8; text-decoration:none; }
</style>
</head>

<body>

<header>
<h2>CASE DATABASE</h2>
<a href="index.html">← Control Room</a>
</header>

<div class="container" id="db"></div>

<script>
const db = JSON.parse(localStorage.getItem("ufo_cases") || "[]");
const container = document.getElementById("db");

if(db.length === 0){
  container.innerHTML = "<p>No cases logged yet.</p>";
}

db.reverse().forEach(c => {
  const div = document.createElement("div");
  div.className = "card";

  div.textContent =
`CASE ID: ${c.id}
DATE: ${c.date}
TIME: ${c.time}
LOCATION: ${c.location}

REPORT:
${c.report}`;

  container.appendChild(div);
});
</script>

</body>
</html>
