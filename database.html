<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CLASSIFIED // CASE DATABASE</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0f0a; font-family:'Courier New',monospace; padding:2rem; }
    .monitor { max-width:1300px; margin:0 auto; background:#0c0e0c; border-radius:2rem; padding:1.5rem; }
    .screen { background:#030803; border-radius:1rem; padding:1.5rem; color:#2eff7a; box-shadow:inset 0 0 40px #000; }
    input, button { background:#051005; border:1px solid #2c5a2c; color:#9f9; padding:0.5rem; font-family:monospace; }
    button { cursor:pointer; margin:0.5rem 0; }
    table { width:100%; border-collapse:collapse; font-size:0.8rem; table-layout: auto; }
    th, td { border-bottom:1px solid #1e4a1e; text-align:left; padding:0.6rem 0.4rem; vertical-align:top; }
    th { background:#0a1a0a; }
    .delete-btn { background:#2a0a0a; border-color:#a44; color:#faa; padding:0.2rem 0.5rem; }
    a { color:#6f6; text-decoration:none; }
    a:hover { text-decoration:underline; color:#0f0; }
    .blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity:0; } }
    .warning { color:#fa8; font-size:0.7rem; margin-top:1rem; border-top:1px dashed #5a5; padding-top:0.5rem; }
    .report-cell {
      max-width: 350px;
      word-wrap: break-word;
      white-space: normal;
      line-height: 1.3;
    }
    .report-cell a {
      color: #88ff88;
      text-decoration: underline;
      word-break: break-all;
    }
    @media (max-width: 800px) {
      .report-cell { max-width: 200px; }
      th, td { font-size:0.7rem; }
    }
  </style>
</head>
<body>
<div class="monitor"><div class="screen">
  <h2>🔍 // CASE DATABASE // TERMINAL VIEW</h2>
  <div class="status" style="margin:10px 0;"><span class="blink">●</span> ACTIVE CONNECTION</div>
  <div>
    <input type="text" id="searchInput" placeholder="FILTER BY NAME / LOCATION / TYPE" style="width:70%;">
    <button id="clearSearch">CLEAR</button>
    <button id="refreshBtn">⟳ REFRESH</button>
  </div>
  <div style="overflow-x:auto; margin-top:1rem;">
    <table id="caseTable">
      <thead>
        <tr><th>ID</th><th>Name</th><th>Date</th><th>Time</th><th>Location</th><th>Type</th><th>Full Report</th><th>Action</th></tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div style="margin-top:1rem;"><a href="index.html">← BACK TO MAIN TERMINAL</a></div>
  <div class="warning">⚠️ DELETION REQUIRES CLEARANCE CODE — UNAUTHORIZED ATTEMPTS ARE LOGGED</div>
</div></div>
<script>
  const ADMIN_PASSWORD = "VAULT2026";   // change as needed

  // Convert URLs in text to clickable <a> tags
  function linkify(text) {
    if (!text) return "";
    // Regex to match http://, https://, and www. links (with or without protocol)
    const urlPattern = /(\b(https?:\/\/|www\.)[^\s<]+[^<.,:;?)\]\s])/gi;
    return text.replace(urlPattern, function(url) {
      let href = url;
      if (!href.match(/^https?:\/\//i)) {
        href = "http://" + href;
      }
      return `<a href="${href}" target="_blank" rel="noopener noreferrer">${url}</a>`;
    });
  }

  function escapeHtml(str) { 
    if(!str) return ""; 
    // Escape HTML special chars first
    let escaped = str.replace(/[&<>]/g, function(m){
      if(m==='&') return '&amp;'; 
      if(m==='<') return '&lt;'; 
      if(m==='>') return '&gt;'; 
      return m;
    });
    // Preserve line breaks
    escaped = escaped.replace(/\n/g, '<br>');
    // Then convert URLs to links
    return linkify(escaped);
  }

  function loadCases(filter = "") {
    const db = JSON.parse(localStorage.getItem("ufo_cases") || "[]");
    const filtered = db.filter(c => 
      c.name.toLowerCase().includes(filter) || 
      c.location.toLowerCase().includes(filter) ||
      c.type.toLowerCase().includes(filter)
    );
    const tbody = document.getElementById("tableBody");
    if(!tbody) return;
    if(filtered.length === 0) {
      tbody.innerHTML = "<tr><td colspan='8' style='text-align:center'>∅ NO MATCHING CASES</td></tr>";
      return;
    }
    tbody.innerHTML = filtered.map((c, idx) => `
      <tr>
        <td>${escapeHtml(c.id || "??")}</td>
        <td>${escapeHtml(c.name)}</td>
        <td>${c.date}</td>
        <td>${c.time}</td>
        <td>${escapeHtml(c.location)}</td>
        <td>${c.type}</td>
        <td class="report-cell">${escapeHtml(c.report) || "—"}</td>
        <td><button class="delete-btn" data-id="${c.id}">DELETE</button></td>
      </tr>
    `).join("");
    
    // attach password-protected delete events
    document.querySelectorAll(".delete-btn").forEach(btn => {
      btn.addEventListener("click", async (e) => {
        const id = btn.getAttribute("data-id");
        const pwd = prompt("⚠️ AUTHORIZED PERSONNEL ONLY\nEnter clearance code to delete this entry:");
        if(pwd !== ADMIN_PASSWORD) {
          alert("ACCESS DENIED. Deletion not permitted.");
          return;
        }
        const confirmDel = confirm("Permanent deletion. Are you sure?");
        if(!confirmDel) return;
        
        let cases = JSON.parse(localStorage.getItem("ufo_cases") || "[]");
        const newCases = cases.filter(c => c.id !== id);
        if(newCases.length === cases.length) {
          alert("Entry not found.");
          return;
        }
        localStorage.setItem("ufo_cases", JSON.stringify(newCases));
        alert("Case permanently deleted from local vault.");
        loadCases(document.getElementById("searchInput").value.toLowerCase());
      });
    });
  }
  
  document.getElementById("searchInput")?.addEventListener("input", (e) => loadCases(e.target.value.toLowerCase()));
  document.getElementById("clearSearch")?.addEventListener("click", () => { document.getElementById("searchInput").value=""; loadCases(""); });
  document.getElementById("refreshBtn")?.addEventListener("click", () => loadCases(document.getElementById("searchInput").value.toLowerCase()));
  loadCases("");
</script>
</body>
</html>
