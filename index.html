<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <style>
        :root { 
            --gold: #ffaa00; 
            --deep: #030303; 
            --phi: 1.618033; 
            --schumann: 7.83s; 
        }
        
        /* Force the browser to reset and kill the "broken" layout */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html { 
            background: var(--deep); 
            color: var(--gold); 
            overflow: hidden; 
            height: 100%; width: 100%;
            display: flex; justify-content: center; align-items: center; 
            font-family: 'Garamond', serif;
        }

        /* THE SPIRAL HULL - Fixed at the center of the soul */
        .universal-spiral { 
            position: absolute; 
            width: 90vmin; height: 90vmin; 
            animation: spiralRotate 60s linear infinite;
            pointer-events: none; /* Clicks pass through */
            display: flex; justify-content: center; align-items: center;
        }

        /* THE BEACON - The only solid point */
        .center-beacon { 
            position: relative;
            width: 120px; height: 120px; 
            background: radial-gradient(circle, var(--gold) 0%, transparent 75%); 
            border-radius: 50%;
            animation: pulse var(--schumann) ease-in-out infinite; 
            cursor: pointer; z-index: 1000;
            pointer-events: auto;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(255,170,0,0.3);
        }

        /* THE PETALS - Floating and Clickable */
        .node { 
            position: absolute; 
            text-decoration: none; 
            color: var(--gold); 
            font-size: clamp(0.7rem, 2vmin, 1rem); 
            opacity: 0.8; 
            font-weight: bold;
            transition: all 0.3s ease;
            pointer-events: auto; 
            white-space: nowrap;
            /* Re-aligned transform for maximum stability */
            transform: rotate(var(--angle)) translateY(calc(-1 * var(--dist))) rotate(calc(-1 * var(--angle)));
        }

        .node:hover { 
            opacity: 1; 
            text-shadow: 0 0 15px var(--gold); 
            transform: rotate(var(--angle)) translateY(calc(-1.1 * var(--dist))) rotate(calc(-1 * var(--angle))) scale(1.2);
        }

        /* THE OCTAVE OF NODES */
        .n1 { --angle: 137.5deg; --dist: 22vmin; } 
        .n2 { --angle: 275.0deg; --dist: 30vmin; } 
        .n3 { --angle: 412.5deg; --dist: 38vmin; } 
        .n4 { --angle: 550.0deg; --dist: 25vmin; } 
        .n5 { --angle: 687.5deg; --dist: 18vmin; } 

        @keyframes spiralRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.15); opacity: 1; } }
    </style>
</head>
