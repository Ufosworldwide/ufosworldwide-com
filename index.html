    <title>NEW EDEN | Frequency Conduit</title>
    <style>
        :root { 
            --gold: #ffaa00; 
            --deep: #030303; 
            --seafoam: #00ffcc;
            --phi: 1.618033; 
            --schumann: 7.83s; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html { 
            background: var(--deep); color: var(--gold); 
            overflow: hidden; height: 100%; width: 100%;
            display: flex; justify-content: center; align-items: center; 
            font-family: 'Garamond', serif;
        }

        .universal-spiral { 
            position: absolute; width: 95vmin; height: 95vmin; 
            animation: spiralRotate 120s linear infinite;
            pointer-events: none; display: flex; justify-content: center; align-items: center;
        }

        /* THE CENTRAL BEACON - PRESIGNAL HUB */
        .center-beacon { 
            position: relative; width: 150px; height: 150px; 
            background: radial-gradient(circle, var(--gold) 0%, transparent 80%); 
            border-radius: 50%; animation: pulse var(--schumann) ease-in-out infinite; 
            cursor: pointer; z-index: 1000; pointer-events: auto;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; border: 1px solid rgba(255,170,0,0.4);
            text-decoration: none;
            transition: transform 0.3s ease;
        }
        .center-beacon:hover { transform: scale(1.08); border-color: #fff; }

        .node { 
            position: absolute; text-decoration: none; color: var(--gold); 
            font-size: clamp(0.7rem, 2.2vmin, 0.9rem); opacity: 0.7; 
            font-weight: bold; transition: all 0.4s ease;
            pointer-events: auto; white-space: nowrap;
            transform: rotate(var(--angle)) translateY(calc(-1 * var(--dist))) rotate(calc(-1 * var(--angle)));
            letter-spacing: 2px;
        }

        .node:hover { 
            opacity: 1; text-shadow: 0 0 20px var(--gold); color: #fff;
            transform: rotate(var(--angle)) translateY(calc(-1.1 * var(--dist))) rotate(calc(-1 * var(--angle))) scale(1.15);
        }

        /* PHYLLOTAXIS NODES */
        .n-ghost { --angle: 137.5deg; --dist: 26vmin; color: var(--seafoam); border-bottom: 1px solid var(--seafoam); padding-bottom: 5px; } 
        .n-ufo { --angle: 275.0deg; --dist: 38vmin; } 

        @keyframes spiralRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 0.9; } }

        #footer-conduit {
            position: fixed; bottom: 30px; width: 100%; text-align: center;
            opacity: 0.4; font-family: 'Garamond', serif; z-index: 2000; pointer-events: none;
        }

        .bio-tag { font-size: 0.55rem; color: #fff; opacity: 0.9; letter-spacing: 3px; margin-top: 8px; }
        .beacon-label { font-family:'Arial Black', sans-serif; font-size: 0.8rem; color: #fff; letter-spacing: 4px; }
    </style>
