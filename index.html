<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Signal Control Network // V2</title>

<style>
  body {
    margin: 0;
    font-family: system-ui, Arial;
    background: radial-gradient(circle at center, #05070c, #0b1220);
    color: #eaeaea;
  }

  header {
    text-align: center;
    padding: 35px 20px 10px;
  }

  h1 {
    margin: 0;
    letter-spacing: 4px;
    font-size: 24px;
  }

  .status {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 8px;
  }

  .pulse {
    display: inline-block;
    width: 7px;
    height: 7px;
    background: #38bdf8;
    border-radius: 50%;
    margin-right: 6px;
    animation: blink 1.3s infinite;
  }

  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .wrap {
    max-width: 900px;
    margin: auto;
    padding: 15px;
  }

  /* LIVE FEED */
  .feed {
    background: rgba(15, 23, 42, 0.85);
    border: 1px solid #1f2937;
    border-radius: 14px;
    padding: 12px;
    min-height: 120px;
  }

  .item {
    padding: 8px 0;
    border-bottom: 1px solid #1f2937;
    font-size: 13px;
  }

  .time {
    font-size: 11px;
    opacity: 0.5;
  }

  /* MODULE GRID */
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    margin-top: 18px;
  }

  @media(min-width: 768px){
    .grid { grid-template-columns: 1fr 1fr; }
  }

  .card {
    background: rgba(15, 23, 42, 0.8);
    border: 1px solid #1f2937;
    border-radius: 14px;
    padding: 14px;
    text-decoration: none;
    color: white;
  }

  .card:hover {
    border-color: #38bdf8;
  }

  .title {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 6px;
  }

  .desc {
    font-size: 12px;
    opacity: 0.7;
  }

  footer {
    text-align: center;
    padding: 25px;
    font-size: 11px;
    opacity: 0.5;
  }
</style>
</head>

<body>

<header>
  <h1>CONTROL NETWORK</h1>
  <div class="status">
    <span class="pulse"></span>V2 SIGNAL SYSTEM ACTIVE
  </div>
</header>

<div class="wrap">

  <!-- LIVE FEED -->
  <div class="feed" id="feed">
    Initializing signal stream...
  </div>

  <!-- MODULES -->
  <div class="grid">

    <a class="card" href="https://thornsignal.netlify.app/" target="_blank">
      <div class="title">🎮 Thorn Signal</div>
      <div class="desc">Narrative field interface</div>
    </a>

    <a class="card" href="https://signalscopex11.netlify.app/" target="_blank">
      <div class="title">📡 SignalScope X11</div>
      <div class="desc">Pattern analysis system</div>
    </a>

    <a class="card" href="https://ether-listen.netlify.app/" target="_blank">
      <div class="title">🎧 Ether Listen</div>
      <div class="desc">Audio perception layer</div>
    </a>

    <a class="card" href="https://www.amazon.com" target="_blank">
      <div class="title">📚 Archive</div>
      <div class="desc">Books + field methodology</div>
    </a>

  </div>

</div>

<footer>
  SIGNAL NETWORK V2 // STANDBY MODE
</footer>

<script>
async function loadFeed() {
  try {
    const res = await fetch('./data/feed.json?cache=' + Date.now());
    const data = await res.json();

    const feed = document.getElementById('feed');
    feed.innerHTML = "";

    data.slice().reverse().forEach(item => {
      const div = document.createElement('div');
      div.className = "item";
      div.innerHTML = `
        <div class="time">${item.time}</div>
        <div>${item.message}</div>
      `;
      feed.appendChild(div);
    });

  } catch (e) {
    document.getElementById('feed').innerHTML =
      "Signal stream offline — awaiting input nodes...";
  }
}

loadFeed();
setInterval(loadFeed, 7000);
</script>

</body>
</html>
