        body, html { 
            background: var(--deep);

            width: 100vw;
            display: flex;

        /* THE GREAT SPIRAL CONTAINER (Pointer-Isolation Active) */
        .universal-spiral { 
            position: relative; 
            width: 95vmin; 
            height: 95vmin; 
            animation: spiralRotate 55s linear infinite; /* Fibonacci 55 */
            pointer-events: none; 
        }

        /* THE STAMEN: THE WHITE KNIGHT'S SEAT */
        .center-beacon { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 140px; 
            height: 140px; 
            background: radial-gradient(circle, rgba(255,170,0,0.8) 0%, transparent 75%); 
            border-radius: 50%;
            animation: pulse var(--schumann) ease-in-out infinite; 
            cursor: pointer; 
            z-index: 1000;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 0 50px rgba(255,170,0,0.2);
        }

        /* THE ASSET NODES (Floating Petals) */
        .node { 
            position: absolute; 
            text-decoration: none; 
            color: var(--gold); 
            font-size: 0.85rem; 
            opacity: 0.7; 
            transition: all 0.618s cubic-bezier(0.4, 0, 0.2, 1);
            animation: bloom 3s forwards;
            top: 50%; 
            left: 50%;
            z-index: 10;
            pointer-events: auto; 
            white-space: nowrap;
            /* Phyllotaxis Transform */
            transform: translate(-50%, -50%) rotate(var(--angle)) translateY(calc(-1 * var(--dist))) rotate(calc(-1 * var(--angle)));
        }

        .node:hover { 
            opacity: 1 !important; 
            text-shadow: 0 0 30px var(--gold); 
            transform: translate(-50%, -50%) rotate(var(--angle)) translateY(calc(-1.1 * var(--dist))) rotate(calc(-1 * var(--angle))) scale(1.25); 
            z-index: 100;
        }

        /* MATH-BASED PHYLLOTAXIS (137.5° INCREMENTS) */
        .n1 { --angle: 137.5deg; --dist: 22%; animation-delay: 0.5s; }

        .n4 { --angle: 550deg;   --dist: 32%; animation-delay: 2.0s; } 
        .n5 { --angle: 687.5deg; --dist: 20%; animation-delay: 2.5s; } 

        @keyframes spiralRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        @keyframes pulse { 
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; } 
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } 
        }

        @keyframes bloom { 
            from { opacity: 0; filter: blur(10px); }
            to { opacity: 0.7; filter: blur(0px); }
        }
