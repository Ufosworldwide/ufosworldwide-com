<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UAP Control Interface</title>

<style>
  body {
    margin: 0;
    font-family: system-ui, Arial;
    background: radial-gradient(circle at center, #05070c, #0b1220);
    color: #eaeaea;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .container {
    width: 92%;
    max-width: 700px;
    text-align: center;
  }

  h1 {
    letter-spacing: 4px;
    font-size: 26px;
    margin-bottom: 6px;
  }

  .sub {
    opacity: 0.7;
    font-size: 13px;
    margin-bottom: 25px;
  }

  .panel {
    background: rgba(15, 23, 42, 0.85);
    border: 1px solid #1f2937;
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 16px;
  }

  input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #333;
    background: #0b1220;
    color: white;
    outline: none;
  }

  textarea {
    height: 120px;
    resize: none;
  }

  button {
    margin-top: 12px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #38bdf8;
    color: black;
    font-weight: bold;
    cursor: pointer;
  }

  button:hover {
    opacity: 0.85;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }

  @media(min-width: 700px){
    .grid {
      grid-template-columns: 1fr 1fr;
    }
  }

  .card {
    background: rgba(15, 23, 42, 0.8);
    border: 1px solid #1f2937;
    padding: 12px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-size: 13px;
  }

  .card:hover {
    border-color: #38bdf8;
  }

  footer {
    margin-top: 20px;
    font-size: 11px;
    opacity: 0.5;
  }
</style>
</head>

<body>

<div class="container">

  <h1>UAP CONTROL INTERFACE</h1>
  <div class="sub">Submission + Signal Network Hub</div>

  <!-- SUBMISSION FORM -->
  <div class="panel">
    <form action="https://formsubmit.co/uaptaskforce@gmail.com" method="POST">

      <input type="text" name="name" placeholder="Your Name / Identifier" required>

      <input type="text" name="location" placeholder="Location / Coordinates">

      <textarea name="message" placeholder="Describe the sighting or signal report..." required></textarea>

      <input type="hidden" name="_subject" value="New UAP Signal Submission">

      <button type="submit">Submit Signal</button>
    </form>
  </div>

  <!-- MODULE LINKS -->
  <div class="grid">

    <a class="card" href="https://thornsignal.netlify.app/" target="_blank">
      🎮 Thorn Signal<br/>Narrative Field System
    </a>

    <a class="card" href="https://signalscopex11.netlify.app/" target="_blank">
      📡 SignalScope X11<br/>Pattern Analysis System
    </a>

    <a class="card" href="https://ether-listen.netlify.app/" target="_blank">
      🎧 Ether Listen<br/>Audio Perception Layer
    </a>

  </div>

  <footer>
    CONTROL NETWORK ACTIVE // FIELD INPUT ENABLED
  </footer>

</div>

</body>
</html>
