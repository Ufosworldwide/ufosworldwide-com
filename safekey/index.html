<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeKey™ — Your Monthly Password Shield · Presignal Inc.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #080c10;
    --surface: #0d1520;
    --border:  #1a2d44;
    --accent:  #00e5ff;
    --accent2: #00ff88;
    --danger:  #ff4455;
    --text:    #c8dff0;
    --muted:   #4a6b88;
    --gold:    #ffd166;
    --warning: #ffcc00;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  .header { width: 100%; max-width: 600px; padding: 40px 20px 20px; text-align: center; }
  .brand { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; letter-spacing: 4px; color: var(--gold); text-shadow: 0 0 20px rgba(255, 209, 102, 0.3); line-height: 1; }
  .sub-brand { font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 5px; }

  .main-card {
    background: var(--surface);
    width: calc(100% - 40px);
    max-width: 500px;
    border-radius: 30px;
    border: 1px solid var(--border);
    padding: 30px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    margin-bottom: 20px;
  }

  /* NEW SENTRY STYLING */
  .sentry-card {
    background: #0a1018;
    width: calc(100% - 40px);
    max-width: 500px;
    border-radius: 20px;
    border: 1px solid var(--border);
    padding: 20px;
    margin-bottom: 30px;
  }
  .sentry-input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 12px; font-family: 'Nunito'; margin: 10px 0; resize: none; }
  .sentry-res { padding: 12px; border-radius: 10px; margin-top: 10px; font-weight: bold; text-align: center; display: none; font-size: 0.9rem; }

  .btn-gen {
    width: 100%;
    padding: 20px;
    border-radius: 15px;
    border: none;
    background: linear-gradient(135deg, var(--accent), #00a8ff);
    color: #000;
    font-weight: 800;
    font-size: 1.2rem;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 5px 15px rgba(0, 229, 255, 0.2);
  }

  .display-box {
    margin-top: 25px;
    background: #000;
    border: 2px dashed var(--border);
    border-radius: 15px;
    padding: 20px;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  #passwordOutput {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.4rem;
    color: var(--accent2);
    word-break: break-all;
    text-align: center;
    filter: blur(8px);
    transition: 0.4s;
  }

  #passwordOutput.revealed { filter: blur(0); }

  .pin-area { margin-top: 20px; display: none; }
  .pin-input { width: 100%; background: #000; border: 1px solid var(--border); color: var(--accent); text-align: center; font-size: 1.8rem; padding: 10px; border-radius: 12px; letter-spacing: 5px; margin-bottom: 10px; }

  .how-section { width: 100%; max-width: 800px; padding: 40px 20px; }
  .step { background: var(--surface); padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 15px; }
  .step h3 { color: var(--accent); margin-bottom: 5px; }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="brand">SAFEKEY™</div>
  <div class="sub-brand">Powered by Presignal Inc.</div>
</div>

<div class="main-card">
  <button class="btn-gen" onclick="generateKey()">GENERATE NEW SHIELD</button>
  
  <div class="display-box" onclick="showPinArea()">
    <div id="passwordOutput">••••••••••••••••••••••••</div>
  </div>

  <div id="authArea" class="pin-area">
    <input type="tel" id="pinInput" class="pin-input" maxlength="4" placeholder="••••" inputmode="numeric">
    <button class="btn-gen" style="background:var(--accent2);" onclick="checkPin()">UNLOCK SHIELD</button>
  </div>
</div>

<div class="sentry-card">
  <h3 style="color:var(--accent); font-family:'Bebas Neue'; letter-spacing:1px;">🛡️ SENTRY SCANNER</h3>
  <p style="font-size:0.8rem; color:var(--muted);">Paste suspicious links or file names below:</p>
  <textarea id="sentryIn" class="sentry-input" rows="2" placeholder="e.g. Urgent_Invoice.exe"></textarea>
  <button class="btn-gen" style="font-size:0.9rem; padding:12px; background:var(--border); color:#fff;" onclick="scan()">SCAN FOR TROJANS</button>
  <div id="sentryOut" class="sentry-res"></div>
</div>

<div class="how-section">
  <div class="step">
    <h3>01. Generate</h3>
    <p>Tap generate to create your unique 24-character monthly shield.</p>
  </div>
  <div class="step">
    <h3>02. Sentry</h3>
    <p>Use the Scanner to identify "Donkey" traps and malicious files.</p>
  </div>
</div>

<script>
  let secretKey = "";
  let masterPin = "1234";

  function generateKey() {
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789!@#$%&*";
    let res = "";
    for (let i = 0; i < 24; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
    secretKey = res;
    document.getElementById('passwordOutput').innerText = "••••••••••••••••••••••••";
    document.getElementById('passwordOutput').classList.remove('revealed');
    document.getElementById('authArea').style.display = "none";
    alert("New Shield Generated. Tap the box to unlock.");
  }

  function showPinArea() {
    if(!secretKey) { alert("Generate a shield first!"); return; }
    document.getElementById('authArea').style.display = "block";
  }

  function checkPin() {
    const val = document.getElementById('pinInput').value;
    if(val === masterPin) {
      const out = document.getElementById('passwordOutput');
      out.innerText = secretKey;
      out.classList.add('revealed');
      document.getElementById('authArea').style.display = "none";
      document.getElementById('pinInput').value = "";
    } else {
      alert("Access Denied.");
      document.getElementById('pinInput').value = "";
    }
  }

  function scan() {
    const val = document.getElementById('sentryIn').value.toLowerCase();
    const res = document.getElementById('sentryOut');
    res.style.display = "block";

    const danger = [".exe", ".zip", ".bat", ".scr", "urgent", "suspended", "action required", "bit.ly"];
    let match = danger.filter(word => val.includes(word));

    if(match.length > 0) {
      res.style.background = "rgba(255, 68, 85, 0.2)";
      res.style.color = "#ff4455";
      res.innerHTML = "🛑 TRAP DETECTED: " + match.join(", ");
    } else {
      res.style.background = "rgba(0, 255, 136, 0.2)";
      res.style.color = "#00ff88";
      res.innerHTML = "✅ NO OBVIOUS TRAPS FOUND.";
    }
  }
</script>
</body>
</html>
