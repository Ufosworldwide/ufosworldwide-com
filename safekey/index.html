<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="frequency" content="7.83Hz"> 
    <meta name="prime-candidate" content="John-Carter-O-Driscoll">
    <title>SafeKey™ | The Universal Cipher</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Garamond&family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        :root { 
            --gold: #ffaa00; 
            --deep: #030303; 
            --phi: 1.61803398875; 
            --schumann: 7.83s;
            --mono: 'Share Tech Mono', monospace;
        }
        
        body, html { 
            background: var(--deep); color: var(--gold); 
            margin: 0; padding: 0; overflow: hidden; height: 100vh;
            font-family: 'Garamond', serif; letter-spacing: 0.1em;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- THE SPIRAL INTERFACE --- */
        .universal-spiral { 
            position: relative; width: 90vmin; height: 90vmin; 
            animation: spiralRotate 55s linear infinite; 
        }

        .center-beacon { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            width: 160px; height: 160px; 
            background: radial-gradient(circle, rgba(255,170,0,0.8) 0%, transparent 70%); 
            border-radius: 50%;
            animation: pulse var(--schumann) ease-in-out infinite; 
            cursor: pointer; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* --- THE CIPHER INTERFACE --- */
        #cipher-ui {
            position: fixed; z-index: 200;
            background: rgba(3, 3, 3, 0.95);
            padding: 30px; border: 1px solid var(--gold);
            text-align: center; border-radius: 2px;
            box-shadow: 0 0 30px rgba(255,170,0,0.1);
            display: none; /* Revealed by Beacon */
        }

        input {
            background: #000; border: 1px solid #333; color: var(--gold);
            font-family: var(--mono); font-size: 1.5rem; width: 100px;
            text-align: center; padding: 10px; margin-bottom: 20px; outline: none;
        }

        .output-box {
            font-family: var(--mono); background: #0a0a0a;
            border: 1px dashed #333; padding: 15px; font-size: 0.9rem;
            word-break: break-all; margin-top: 20px; min-height: 40px;
        }

        .btn {
            background: var(--gold); color: #000; border: none;
            padding: 10px 20px; font-family: 'Bebas Neue';
            cursor: pointer; letter-spacing: 2px;
        }

        .node { 
            position: absolute; text-decoration: none; color: var(--gold); 
            font-size: 0.7rem; opacity: 0.6; font-family: var(--mono);
            animation: bloom 3s forwards;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(var(--angle)) translateY(calc(-1 * var(--dist))) rotate(calc(-1 * var(--angle)));
        }

        @keyframes spiralRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } }
        @keyframes bloom { to { opacity: 0.8; } }
    </style>
</head>
<body>

    <div class="universal-spiral">
        <div class="center-beacon" onclick="toggleUI()">
            <span style="font-family:'Bebas Neue'; font-size: 1.5rem;">GENERATE</span>
            <span style="font-size:0.5rem;">SAFEKEY™</span>
        </div>
        
        <a href="index.html" class="node" style="--angle:137.5deg; --dist:25%;">RETURN TO BEACON</a>
        <a href="app.html" class="node" style="--angle:275deg; --dist:35%;">INTELLIGENCE FEED</a>
        <a href="NewEden/index.html" class="node" style="--angle:412.5deg; --dist:42%;">NEW EDEN</a>
        <a href="presignal.html" class="node" style="--angle:550deg; --dist:38%;">WHO IS CARTER?</a>
    </div>

    <div id="cipher-ui">
        <div style="font-family:'Bebas Neue'; font-size: 1.8rem; margin-bottom: 10px;">ENTER 4-DIGIT PIN</div>
        <input type="password" id="user-pin" maxlength="4" placeholder="0000" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        <br>
        <button class="btn" onclick="generateKey()">CRYSTALLIZE KEY</button>
        <div class="output-box" id="key-output">...Waiting for input...</div>
        <div style="margin-top: 15px; font-size: 0.5rem; color: #555;" onclick="toggleUI()">CLOSE INTERFACE</div>
    </div>

    <script>
        function toggleUI() {
            const ui = document.getElementById('cipher-ui');
            ui.style.display = (ui.style.display === 'block') ? 'none' : 'block';
        }

        async function generateKey() {
            const pin = document.getElementById('user-pin').value;
            if (pin.length !== 4) {
                alert("The Pin must be exactly 4 digits.");
                return;
            }

            // Create a salt using the PIN and the Prime Month/Year (May 2026)
            const seed = "JohnCarter" + pin + "May2026";
            
            // Hash the seed to create a deterministic but unguessable hex key
            const msgBuffer = new TextEncoder().encode(seed);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hexHash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            
            // Extract exactly 24 characters of the Hex key
            const safeKey = hexHash.substring(0, 24);
            
            document.getElementById('key-output').innerText = safeKey;
            document.getElementById('key-output').style.color = "#fff";
            document.getElementById('key-output').style.border = "1px solid var(--gold)";
        }
    </script>

</body>
</html>
